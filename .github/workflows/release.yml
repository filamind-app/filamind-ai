name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─── Build SPK for each device branch and attach to the Release ────────
  build-and-release:
    name: Build SPK + GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha:     ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version metadata
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          SHA="$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"         >> "$GITHUB_OUTPUT"
          echo "Building Release $TAG (sha $SHA)"

      # ─── Pre-flight: ensure device branches are caught up to main ─────
      # Device branches must be fast-forward-only from main + their own overlay
      # commits (binaries, INFO variant). If main has moved on without a merge,
      # FAIL THE BUILD — better than shipping an SPK labeled vX with code from
      # vX-N inside. (This caught a real bug where Filamind-1.3.0-dva3221.spk
      # actually contained v1.2.4 code in production.)
      - name: Verify device branches contain main's history
        run: |
          # actions/checkout for a tag puts us in detached-HEAD mode, so a
          # local "main" branch doesn't exist. Use origin/main and fetch
          # device branches into local refs we can address.
          git fetch origin main:main device/dva3221:device/dva3221 device/ds1821-plus:device/ds1821-plus
          MAIN_TIP=$(git rev-parse main)
          echo "main tip = $MAIN_TIP"
          for branch in device/dva3221 device/ds1821-plus; do
            if ! git merge-base --is-ancestor "$MAIN_TIP" "$branch"; then
              echo "::error::$branch does not contain main's tip ($MAIN_TIP) — refusing to build."
              echo "         Run: git checkout $branch && git merge main && git push"
              exit 1
            fi
          done
          # Also verify the INFO version on each branch matches the tag we're releasing.
          for branch in device/dva3221 device/ds1821-plus; do
            v=$(git show "$branch:spk-source/INFO" | sed -n 's/^version="\([0-9.]*\)-.*"/\1/p')
            if [ "$v" != "${{ steps.meta.outputs.version }}" ]; then
              echo "::error::$branch INFO version is '$v' but tag is '${{ steps.meta.outputs.version }}'"
              exit 1
            fi
          done

      - name: Build DVA 3221 SPK (CUDA GPU)
        run: |
          git checkout device/dva3221
          # On dva3221 branch the compiled llama-server / llama-main are tracked.
          sed -i "s|/mnt/c/Users/Eg2/Desktop/saynolgy|$PWD|g" build_spk.sh
          bash build_spk.sh
          mkdir -p _artifacts
          mv Filamind.spk "_artifacts/Filamind-${{ steps.meta.outputs.version }}-dva3221.spk"
          # Post-build proof — re-extract and re-check the version embedded in the SPK
          mkdir -p _verify
          tar xf "_artifacts/Filamind-${{ steps.meta.outputs.version }}-dva3221.spk" -C _verify
          v=$(grep '^version' _verify/INFO | sed 's/.*"\(.*\)".*/\1/')
          # The control_daemon.py path inside package.tgz is './bin/control_daemon.py'
          # (the tar was created from `cd package && tar cf .` which prefixes everything
          # with ./). Match either form.
          tarv=$(tar xzOf _verify/package.tgz ./bin/control_daemon.py 2>/dev/null | grep '^DAEMON_VERSION' | sed 's/.*"\(.*\)".*/\1/')
          [ -z "$tarv" ] && tarv=$(tar xzOf _verify/package.tgz bin/control_daemon.py 2>/dev/null | grep '^DAEMON_VERSION' | sed 's/.*"\(.*\)".*/\1/')
          echo "DVA3221 SPK INFO version: $v   DAEMON_VERSION: $tarv"
          if [ "$tarv" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::DVA3221 SPK was built but DAEMON_VERSION inside is '$tarv', expected '${{ steps.meta.outputs.version }}'"
            exit 1
          fi
          rm -rf _verify
          ls -lh _artifacts/

      - name: Build DS1821+ SPK (CPU AVX2) — best effort
        continue-on-error: true     # CPU build script may not have produced a real binary yet
        run: |
          git checkout device/ds1821-plus
          # Stub binary if the CPU build script hasn't produced one yet.
          mkdir -p spk-source/package/bin
          [ -f spk-source/package/bin/llama-server ] || echo "stub" > spk-source/package/bin/llama-server
          [ -f spk-source/package/bin/llama-main   ] || echo "stub" > spk-source/package/bin/llama-main
          sed -i "s|/mnt/c/Users/Eg2/Desktop/saynolgy|$PWD|g" build_spk.sh
          bash build_spk.sh
          mv Filamind.spk "_artifacts/Filamind-${{ steps.meta.outputs.version }}-ds1821-plus.spk" || true
          ls -lh _artifacts/ || true

      - name: Compute checksums
        run: |
          cd _artifacts
          sha256sum *.spk > SHA256SUMS
          cat SHA256SUMS

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Pull the section for this version out of CHANGELOG.md
          VERSION="${{ steps.meta.outputs.version }}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { capture=1; print; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > _artifacts/RELEASE_NOTES.md
          if [ ! -s _artifacts/RELEASE_NOTES.md ]; then
            echo "## Filamind AI v$VERSION" > _artifacts/RELEASE_NOTES.md
            echo "" >> _artifacts/RELEASE_NOTES.md
            echo "See [CHANGELOG.md](https://github.com/filamind-app/filamind-ai/blob/main/CHANGELOG.md) for details." >> _artifacts/RELEASE_NOTES.md
          fi
          echo "---" >> _artifacts/RELEASE_NOTES.md
          echo "## Install · التثبيت" >> _artifacts/RELEASE_NOTES.md
          echo "" >> _artifacts/RELEASE_NOTES.md
          echo "**Recommended (one-click updates):** add the Package Source URL once:" >> _artifacts/RELEASE_NOTES.md
          echo "" >> _artifacts/RELEASE_NOTES.md
          echo "> DSM → Package Center → Settings → Package Sources → Add" >> _artifacts/RELEASE_NOTES.md
          echo "> Location: \`https://filamind-app.github.io/filamind-ai/\`" >> _artifacts/RELEASE_NOTES.md
          echo "" >> _artifacts/RELEASE_NOTES.md
          echo "**Manual install:** download the SPK matching your device and upload via Package Center → Manual Install." >> _artifacts/RELEASE_NOTES.md
          echo "" >> _artifacts/RELEASE_NOTES.md
          echo "| Device | SPK |" >> _artifacts/RELEASE_NOTES.md
          echo "|---|---|" >> _artifacts/RELEASE_NOTES.md
          [ -f "_artifacts/Filamind-${VERSION}-dva3221.spk" ]      && echo "| DVA 3221 (GTX 1650, CUDA) | \`Filamind-${VERSION}-dva3221.spk\` |"       >> _artifacts/RELEASE_NOTES.md
          [ -f "_artifacts/Filamind-${VERSION}-ds1821-plus.spk" ]  && echo "| DS1821+ (Ryzen V1500B, CPU AVX2) | \`Filamind-${VERSION}-ds1821-plus.spk\` |" >> _artifacts/RELEASE_NOTES.md
          cat _artifacts/RELEASE_NOTES.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  ${{ steps.meta.outputs.tag }}
          name:      Filamind AI ${{ steps.meta.outputs.tag }}
          body_path: _artifacts/RELEASE_NOTES.md
          files: |
            _artifacts/*.spk
            _artifacts/SHA256SUMS
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.version, 'rc') || contains(steps.meta.outputs.version, 'beta') || contains(steps.meta.outputs.version, 'alpha') }}

  # ─── Refresh GitHub Pages (Package Source) ─────────────────────────────
  publish-pages:
    name: Refresh Package Source (Pages)
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate packages.json for DSM
        env:
          VERSION: ${{ needs.build-and-release.outputs.version }}
        run: |
          mkdir -p _pages
          cp -r docs/* _pages/ 2>/dev/null || true
          python3 docs/_build_packages_json.py "$VERSION" > _pages/packages.json
          ls -la _pages/
          cat _pages/packages.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages
      - id: deploy
        uses: actions/deploy-pages@v5
